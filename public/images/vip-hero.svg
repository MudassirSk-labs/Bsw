<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a261" />
      <stop offset="100%" style="stop-color:#e63946" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="24"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#f4a261" opacity="0.08"/>
  <circle cx="700" cy="400" r="80" fill="#e63946" opacity="0.06"/>
  <circle cx="650" cy="100" r="40" fill="#253998" opacity="0.05"/>
  
  <!-- Crown Icon -->
  <g transform="translate(400, 140)" filter="url(#shadow)">
    <!-- Crown base -->
    <path d="M-80,50 L-100,-10 L-45,20 L0,-40 L45,20 L100,-10 L80,50 Z" 
          fill="url(#crownGrad)" stroke="#d48c3d" stroke-width="2"/>
    <!-- Crown jewels -->
    <circle cx="0" cy="-10" r="8" fill="#e63946" stroke="#fff" stroke-width="2"/>
    <circle cx="-50" cy="10" r="6" fill="#253998" stroke="#fff" stroke-width="2"/>
    <circle cx="50" cy="10" r="6" fill="#253998" stroke="#fff" stroke-width="2"/>
    <!-- Crown band -->
    <rect x="-85" y="45" width="170" height="8" rx="4" fill="#d48c3d"/>
  </g>
  
  <!-- Sparkles -->
  <text x="180" y="100" font-size="24" fill="#f4a261" opacity="0.6">✦</text>
  <text x="600" y="380" font-size="20" fill="#e63946" opacity="0.5">✦</text>
  <text x="150" y="420" font-size="16" fill="#253998" opacity="0.4">✦</text>
  <text x="640" y="180" font-size="18" fill="#f4a261" opacity="0.5">✦</text>
  
  <!-- Text -->
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#1e293b">VIP CLUB</text>
  <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">Exclusive Perks &amp; Discounts</text>
  
  <!-- Badge at bottom -->
  <g transform="translate(400, 430)">
    <rect x="-70" y="-18" width="140" height="36" rx="18" fill="#e63946"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">$25 / month</text>
  </g>
</svg>
