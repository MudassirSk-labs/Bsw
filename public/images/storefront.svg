<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="storeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#storeBg)" rx="20"/>
  <!-- Building -->
  <rect x="150" y="100" width="300" height="220" rx="8" fill="#e2e8f0"/>
  <rect x="140" y="90" width="320" height="20" rx="4" fill="#253998"/>
  <!-- Door -->
  <rect x="260" y="210" width="80" height="110" rx="6" fill="#1e293b"/>
  <circle cx="325" cy="265" r="4" fill="#f4a261"/>
  <!-- Windows -->
  <rect x="170" y="130" width="60" height="60" rx="6" fill="#fbbf24" opacity="0.6"/>
  <rect x="370" y="130" width="60" height="60" rx="6" fill="#fbbf24" opacity="0.6"/>
  <!-- Sign -->
  <rect x="200" y="70" width="200" height="40" rx="8" fill="#e63946"/>
  <text x="300" y="96" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">BSW OUTLET</text>
  <!-- Sidewalk -->
  <rect x="100" y="320" width="400" height="10" rx="3" fill="#94a3b8" opacity="0.4"/>
  <!-- Shopping bags -->
  <g transform="translate(120, 240)">
    <rect x="0" y="10" width="30" height="40" rx="4" fill="#e63946"/>
    <path d="M15,10 Q15,0 5,0 M15,10 Q15,0 25,0" stroke="#c1121f" stroke-width="2" fill="none"/>
    <text x="15" y="38" text-anchor="middle" font-size="10" fill="white">BSW</text>
  </g>
  <g transform="translate(450, 230)">
    <rect x="0" y="10" width="25" height="35" rx="4" fill="#f4a261"/>
    <path d="M12,10 Q12,0 4,0 M12,10 Q12,0 20,0" stroke="#d48c3d" stroke-width="2" fill="none"/>
    <text x="12" y="33" text-anchor="middle" font-size="9" fill="white">VIP</text>
  </g>
  <!-- Stars -->
  <text x="90" y="160" font-size="22" fill="#f4a261" opacity="0.5">★</text>
  <text x="510" y="200" font-size="18" fill="#e63946" opacity="0.4">★</text>
  <text x="480" y="350" font-size="16" fill="#253998" opacity="0.3">★</text>
  <text x="100" y="350" font-size="20" fill="#f4a261" opacity="0.4">★</text>
</svg>
